<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../css/mobile.css">

<title>Remaining Products</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial;
background:#f4f7fb;
padding:15px;
}

/* ================= MAIN BOX ================= */

.box{
background:white;
padding:20px;
border-radius:10px;
max-width:1100px;
margin:auto;
}

/* ================= TOP ================= */

.top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
gap:15px;
flex-wrap:wrap;
}

.top h1{
font-size:28px;
}

.clock{
background:#2563eb;
color:white;
padding:10px 20px;
border-radius:10px;
font-weight:bold;
font-size:14px;
text-align:center;
}

.top-right{
display:flex;
align-items:center;
gap:12px;
flex-wrap:wrap;
}

#userBadge{
background:#f1f5f9;
color:#334155;
padding:10px 14px;
border-radius:10px;
font-size:13px;
font-weight:600;
}

/* ================= FORM ================= */

input{
width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:5px;
font-size:15px;
}

button{
padding:12px 20px;
background:#2563eb;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
font-size:16px;
transition:0.3s;
}

button:hover{
background:#1d4ed8;
}

.logout-btn{
background:#ef4444;
padding:10px 14px;
font-size:13px;
}

.logout-btn:hover{
background:#dc2626;
}

/* ================= TABLE ================= */

.table-box{
margin-top:30px;
overflow-x:auto;
border-radius:10px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
min-width:850px;
}

table th{
background:#2563eb;
color:white;
padding:12px;
text-align:left;
font-size:14px;
}

table td{
padding:12px;
border-bottom:1px solid #ddd;
font-size:14px;
}

.delete-btn{
background:red;
color:white;
border:none;
padding:8px 14px;
border-radius:5px;
cursor:pointer;
font-size:13px;
}

.delete-btn:hover{
background:darkred;
}

.no-data{
text-align:center;
padding:20px;
}

/* ================= MOBILE VIEW ================= */

@media(max-width:768px){

body{
padding:10px;
}

.box{
padding:15px;
}

.top{
flex-direction:column;
align-items:flex-start;
}

.top h1{
font-size:22px;
}

.top-right{
width:100%;
flex-direction:column;
align-items:stretch;
}

.clock,
#userBadge,
.logout-btn{
width:100%;
text-align:center;
}

button{
width:100%;
}

table th,
table td{
padding:10px;
font-size:13px;
}

}

@media(max-width:480px){

.top h1{
font-size:20px;
}

input{
padding:10px;
font-size:14px;
}

button{
padding:11px;
font-size:14px;
}

.clock{
font-size:13px;
padding:10px;
}

#userBadge{
font-size:12px;
}

table{
min-width:750px;
}

}

</style>
</head>

<body>

<div class="box">

<!-- ================= TOP ================= -->

<div class="top">

<h1>Remaining Products</h1>

<div class="top-right">

<div class="clock" id="dateTime"></div>

<div id="userBadge"></div>

<button
type="button"
onclick="stsLogout()"
class="logout-btn">

Logout

</button>

</div>

</div>

<!-- ================= FORM ================= -->

<input
type="text"
id="companyName"
placeholder="Company Name">

<select id="productName" required>
<option value="">Select Product</option>
</select>

<input
type="number"
id="soldProducts"
placeholder="Sold Products"
min="0">

<input
type="number"
id="totalProducts"
placeholder="Total Products"
min="1">

<input
type="number"
id="minStock"
placeholder="Minimum Stock Level"
min="1"
value="10">

<button onclick="saveData()">
Save Data
</button>

<!-- ================= TABLE ================= -->

<div class="table-box">

<table>

<thead>

<tr>

<th>ID</th>

<th>Date & Time</th>

<th>Company Name</th>

<th>Product</th>

<th>Sold Products</th>

<th>Remaining Products</th>

<th>Min Stock</th>

<th>Total Products</th>

<th>Action</th>

</tr>

</thead>

<tbody id="tableBody">

</tbody>

</table>

</div>

</div>

<script src="../js/auth.js"></script>
<script src="../js/sts-delete.js"></script>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>

/* ============================================================
AUTH GUARD
============================================================ */

(function authGuard(){

let user = null;

try{

user = JSON.parse(
sessionStorage.getItem("stsUser") || "null"
);

}catch(_err){

user = null;

}

if(!user || !user.email){

window.location.replace(
"../login/loginPage.html"
);

return;

}

if(user.role === "employee"){

window.location.replace(
"../employees/EmployeesDashboard.html"
);

return;

}

if(user.role === "distributor"){

window.location.replace(
"../Distributer/DistributerDashboard.html"
);

return;

}

if(user.role === "superstockist"){

window.location.replace(
"../superstockist/superstockistDashboard.html"
);

return;

}

})();

/* ============================================================
LOGOUT
============================================================ */

function stsLogout(){

sessionStorage.removeItem("stsUser");

sessionStorage.removeItem("employeeId");

sessionStorage.removeItem("employeeName");

window.location.replace(
"../login/loginPage.html"
);

}

/* ============================================================
USER CONTEXT
============================================================ */

(function applyUserContext(){

let user = null;

try{

user = JSON.parse(
sessionStorage.getItem("stsUser") || "null"
);

}catch(_err){

user = null;

}

if(!user) return;

const badge =
document.getElementById("userBadge");

if(badge){

const roleLabel =
user.role === "company"
? "Company"
: "Manager";

badge.textContent =
roleLabel + ": " +
(user.name || user.email);

}

if(
user.role === "company" &&
user.companyName
){

const el =
document.getElementById(
"companyName"
);

if(el){

el.value = user.companyName;

el.readOnly = true;

el.style.background = "#eef2ff";

el.title =
"Locked to your company account";

}

}

})();

/* ============================================================
CLOCK
============================================================ */

function updateClock(){

const now = new Date();

document.getElementById(
"dateTime"
).innerHTML =
now.toLocaleString();

}

updateClock();

setInterval(updateClock,1000);

/* ============================================================
STORAGE (MySQL via API)
============================================================ */

const API_BASE = "https://sales-tracking-system-n9am.onrender.com/api";
let companies = [];
let inventorySocket = null;

async function loadCompaniesFromApi() {
    try {
        const res = await fetch(API_BASE + "/superstockist/company-inventory/snapshot");
        companies = await res.json();
        renderTable();
    } catch (_err) {
        companies = [];
        renderTable();
    }
}

/* ============================================================
REALTIME SOCKET
============================================================ */

function initInventoryRealtime(){

if(inventorySocket){
return;
}

inventorySocket = io(
"https://sales-tracking-system-n9am.onrender.com",
{
transports:["websocket","polling"]
}
);

inventorySocket.on("connect",()=>{

console.log("Inventory Connected");

inventorySocket.emit(
"inventory:subscribe"
);

});

inventorySocket.on(
"inventory:snapshot",
(list)=>{

companies =
Array.isArray(list)
? list.slice()
: [];

renderTable();

}
);

}

/* ============================================================
QUERY PREFILL
============================================================ */

(function applyCompanyQueryPrefill(){

try{

const params =
new URLSearchParams(
window.location.search
);

const cn =
params.get("companyName");

if(!cn) return;

const el =
document.getElementById(
"companyName"
);

if(
el &&
!String(el.value || "").trim()
){

el.value = cn;

}

}catch(_err){}

})();

/* ============================================================
SAVE DATA
============================================================ */

function saveData(){

const companyName =
document.getElementById(
"companyName"
).value.trim();

const productName =
document.getElementById(
"productName"
).value.trim();

const soldProducts =
Number(
document.getElementById(
"soldProducts"
).value
);

const totalProducts =
Number(
document.getElementById(
"totalProducts"
).value
);

const minStock =
Number(
document.getElementById(
"minStock"
).value || 10
);

if(
!companyName ||
!productName ||
!totalProducts
){

alert(
"Please select a company name, product, and total products"
);

return;

}

const remainingProducts =
totalProducts - (Number.isFinite(soldProducts) ? soldProducts : 0);

if (remainingProducts < 0) {
alert("Sold products cannot exceed total products.");
return;
}

fetch(API_BASE + "/superstockist/company-inventory", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
        company_name: companyName,
        product_name: productName,
        sold_products: Number.isFinite(soldProducts) ? soldProducts : 0,
        remaining_products: remainingProducts,
        min_stock: minStock,
        total_products: totalProducts,
        date_time: new Date()
    })
}).then(() => {
    document.getElementById("soldProducts").value = "";
    document.getElementById("totalProducts").value = "";
    loadCompaniesFromApi();
}).catch(() => alert("Could not save inventory record."));

}

/* ============================================================
RENDER TABLE
============================================================ */

function renderTable(){

const tableBody =
document.getElementById(
"tableBody"
);

tableBody.innerHTML = "";

if(companies.length === 0){

tableBody.innerHTML = `

<tr>

<td colspan="9"
class="no-data">

No Data Found

</td>

</tr>

`;

return;

}

companies.forEach((company)=>{

tableBody.innerHTML += `

<tr>

<td>${company.id}</td>

<td>${company.dateTime}</td>

<td>${company.companyName}</td>

<td>${company.productName || "--"}</td>

<td>${company.soldProducts}</td>

<td>${company.remainingProducts}</td>

<td>${company.minStock ?? 10}</td>

<td>${company.totalProducts}</td>

<td>${StsDelete.buttonHtml(API_BASE + "/superstockist/company-inventory/" + company.id, StsDelete.DEFAULT_CONFIRM, "loadCompaniesFromApi")}</td>

</tr>

`;

});

}

/* ============================================================
START
============================================================ */

window.loadCompaniesFromApi = loadCompaniesFromApi;
loadCompaniesFromApi();
initInventoryRealtime();
loadProductOptions();

async function loadProductOptions() {
  try {
    const res = await fetch(API_BASE + "/superstockist/inventory");
    const products = await res.json();
    const select = document.getElementById("productName");
    if (!select) return;
    const current = select.value;
    select.innerHTML = '<option value="">Select Product</option>';
    (Array.isArray(products) ? products : []).forEach((item) => {
      const name = item.product_name || item.productName;
      if (!name) return;
      const option = document.createElement("option");
      option.value = name;
      option.textContent = name;
      select.appendChild(option);
    });
    if (current) select.value = current;
  } catch (_err) {
    /* product list optional on load failure */
  }
}

</script>

</body>
</html>
