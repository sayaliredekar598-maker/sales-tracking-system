<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Remaining Products</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

body{
font-family:Arial;
background:#f4f7fb;
padding:20px;
}

/* ================= BACK BUTTON ================= */

.back-btn{
display:inline-flex;
align-items:center;
gap:8px;

background:#2563eb;
color:white;

padding:10px 18px;

border-radius:10px;

text-decoration:none;

font-weight:600;

margin-bottom:20px;

transition:0.3s;
}

.back-btn:hover{
background:#1d4ed8;
transform:translateY(-2px);
}

.back-btn i{
font-size:14px;
}

/* ================= TOP ================= */

.top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.clock{
background:white;
padding:10px 20px;
border-radius:10px;
font-weight:bold;
}

/* ================= CARDS ================= */

.card-box{
display:flex;
gap:20px;
margin-bottom:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
flex:1;
}

/* ================= TABLE ================= */

table{
width:100%;
border-collapse:collapse;
background:white;
}

table th{
background:#6a5cff;
color:white;
padding:12px;
}

table td{
padding:12px;
border-bottom:1px solid #ddd;
}

/* ================= DELETE BUTTON ================= */

.delete-btn{
background:red;
color:white;
border:none;
padding:8px 14px;
border-radius:5px;
cursor:pointer;
}

.delete-btn:hover{
background:darkred;
}

</style>
</head>

<body>

<!-- ================= BACK BUTTON ================= -->

<a href="OurCompany.html"
class="back-btn">

<i class="fas fa-arrow-left"></i>

Back to Dashboard

</a>

<!-- ================= TOP ================= -->

<div class="top">

<h1>Remaining Products</h1>

<div class="clock"
id="remainingProductsDateTime"></div>

</div>

<!-- ================= CARDS ================= -->

<div class="card-box">

<div class="card">

<h3>Total Product Quantity</h3>

<h1 id="totalProductQuantity">0</h1>

</div>

<div class="card">

<h3>Remaining Products</h3>

<h1 id="remainingProductsTotal">0</h1>

</div>

</div>

<!-- ================= TABLE ================= -->

<table>

<thead>

<tr>

<th>ID</th>

<th>Date & Time</th>

<th>Company Name</th>

<th>Sold Products</th>

<th>Remaining Products</th>

<th>Total Products</th>

<th>Action</th>

</tr>

</thead>

<tbody id="companyProductsBody">

</tbody>

</table>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>

/* ================= STORAGE ================= */

let companies =
JSON.parse(
localStorage.getItem("companies")
) || [];

let inventorySocket = null;

/* ================= REALTIME SOCKET ================= */

function initInventoryRealtime(){

if(inventorySocket){
return;
}

/* SOCKET CONNECTION */

inventorySocket = io(
"https://sales-tracking-system-n9am.onrender.com",
{
transports:["websocket","polling"]
}
);

/* CONNECT */

inventorySocket.on("connect",()=>{

console.log(
"Remaining Products Connected"
);

/* SUBSCRIBE */

inventorySocket.emit(
"inventory:subscribe"
);

});

/* LIVE DATA */

inventorySocket.on(
"inventory:snapshot",
(list)=>{

companies =
Array.isArray(list)
? list.slice()
: [];

/* SAVE */

try{

localStorage.setItem(
"companies",
JSON.stringify(companies)
);

}catch(_e){}

/* RENDER */

renderRows();

}
);

}

/* ================= ELEMENTS ================= */

const totalProductQuantity =
document.getElementById(
"totalProductQuantity"
);

const remainingProductsTotal =
document.getElementById(
"remainingProductsTotal"
);

const companyProductsBody =
document.getElementById(
"companyProductsBody"
);

/* ================= REAL TIME CLOCK ================= */

function updateClock(){

const now = new Date();

document.getElementById(
"remainingProductsDateTime"
).innerHTML =
now.toLocaleString();

}

updateClock();

setInterval(updateClock,1000);

/* ================= RENDER TABLE ================= */

function renderRows(){

companyProductsBody.innerHTML = "";

if(companies.length === 0){

companyProductsBody.innerHTML = `

<tr>

<td colspan="7"
style="text-align:center;">

No Data Found

</td>

</tr>

`;

updateTotals();

return;

}

/* LOOP */

companies.forEach((r)=>{

companyProductsBody.innerHTML += `

<tr>

<td>${r.id}</td>

<td>${r.dateTime || "N/A"}</td>

<td>${r.companyName}</td>

<td>${r.soldProducts}</td>

<td>${r.remainingProducts}</td>

<td>${r.totalProducts}</td>

<td>

<button
class="delete-btn"
onclick="deleteCompany(${r.id})">

Delete

</button>

</td>

</tr>

`;

});

/* UPDATE TOTALS */

updateTotals();

}

/* ================= DELETE ================= */

function deleteCompany(id){

if(
inventorySocket &&
inventorySocket.connected
){

inventorySocket.emit(
"inventory:delete",
{ id }
);

return;

}

/* OFFLINE DELETE */

companies =
companies.filter(
(c)=>c.id !== id
);

/* SAVE */

localStorage.setItem(
"companies",
JSON.stringify(companies)
);

/* REFRESH */

renderRows();

}

/* ================= UPDATE TOTALS ================= */

function updateTotals(){

const totalQty =
companies.reduce(
(sum,r)=>
sum + Number(r.totalProducts),
0
);

const remainingQty =
companies.reduce(
(sum,r)=>
sum + Number(r.remainingProducts),
0
);

totalProductQuantity.innerHTML =
totalQty;

remainingProductsTotal.innerHTML =
remainingQty;

}

/* ================= START ================= */

renderRows();

initInventoryRealtime();

</script>

</body>
</html>
