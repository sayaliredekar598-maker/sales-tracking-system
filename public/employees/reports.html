<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Employee Reports</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Poppins,sans-serif;
}

body{
    background:#f1f5f9;
    padding:30px;
}

/* CONTAINER */

.container{
    background:white;
    border-radius:16px;
    padding:25px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
    animation:fade 0.5s ease;
    width:100%;
    overflow:hidden;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* EMPLOYEE HEADER */

.employee-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
    flex-wrap:wrap;
    gap:15px;
}

.profile{
    display:flex;
    align-items:center;
    gap:15px;
}

.profile-img{
    width:60px;
    height:60px;
    border-radius:50%;
    background:#2563eb;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:24px;
    font-weight:600;
    flex-shrink:0;
}

.profile h2{
    font-size:22px;
    color:#111827;
}

.profile p{
    color:#6b7280;
    font-size:14px;
}

/* TITLE */

.title{
    font-size:24px;
    font-weight:600;
    margin-bottom:20px;
    color:#111827;
}

/* TABLE */

.table-wrapper{
    width:100%;
    overflow-x:auto;
    border-radius:12px;
}

table{
    width:100%;
    min-width:850px;
    border-collapse:collapse;
}

table th{
    background:#2563eb;
    color:white;
    padding:14px;
    font-size:14px;
    white-space:nowrap;
}

table td{
    border:1px solid #ddd;
    padding:12px;
    text-align:center;
    font-size:14px;
    white-space:nowrap;
}

.status{
    color:green;
    font-weight:600;
}

/* DELETE BUTTON */

.delete-btn{
    background:#ef4444;
    color:white;
    border:none;
    padding:8px 14px;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
    font-size:13px;
}

.delete-btn:hover{
    background:#dc2626;
    transform:scale(1.05);
}

/* NO DATA */

.no-data{
    text-align:center;
    margin-top:20px;
    color:#777;
}

/* BUTTON */

.back-btn{
    margin-top:20px;
    padding:12px 18px;
    border:none;
    background:#2563eb;
    color:white;
    border-radius:10px;
    cursor:pointer;
    transition:0.3s;
    font-size:14px;
}

.back-btn:hover{
    transform:scale(1.03);
}

/* ================= MOBILE VIEW ================= */

@media(max-width:768px){

    body{
        padding:15px;
    }

    .container{
        padding:18px;
    }

    .employee-header{
        flex-direction:column;
        align-items:flex-start;
    }

    .profile{
        width:100%;
    }

    .profile h2{
        font-size:20px;
    }

    .title{
        font-size:22px;
    }

    .profile-img{
        width:52px;
        height:52px;
        font-size:20px;
    }

    table th,
    table td{
        padding:10px;
        font-size:13px;
    }

    .back-btn{
        width:100%;
    }

}

/* EXTRA SMALL MOBILE */

@media(max-width:480px){

    body{
        padding:10px;
    }

    .container{
        padding:15px;
        border-radius:12px;
    }

    .profile{
        gap:10px;
    }

    .profile-img{
        width:45px;
        height:45px;
        font-size:18px;
    }

    .profile h2{
        font-size:18px;
    }

    .profile p{
        font-size:12px;
    }

    .title{
        font-size:20px;
    }

    table th,
    table td{
        font-size:12px;
        padding:8px;
    }

    .back-btn{
        padding:10px;
        font-size:13px;
    }

}

</style>
</head>

<body>

<div class="container">

    <!-- EMPLOYEE HEADER -->

    <div class="employee-header">

        <div class="profile">

            <div class="profile-img"></div>

            <div>

                <h2 id="employeeName"></h2>

                <p>Sales Executive</p>

            </div>

        </div>

    </div>

    <!-- TITLE -->

    <div class="title">
        Employee Reports
    </div>

    <!-- TABLE -->

    <div class="table-wrapper">

        <table>

            <thead>

                <tr>

                    <th>Date & Time</th>
                    <th>Location</th>
                    <th>Product</th>
                    <th>Quantity</th>
                    <th>Total Sales</th>
                    <th>Status</th>
                    <th>Action</th>

                </tr>

            </thead>

            <tbody id="tableBody">

            </tbody>

        </table>

    </div>

    <!-- NO DATA -->

    <div class="no-data" id="noData">
        No Reports Found
    </div>

    <!-- BUTTON -->

    <button class="back-btn" onclick="goBack()">
        Back
    </button>

</div>

<script>

const loggedInUser =
JSON.parse(sessionStorage.getItem("stsUser") || "{}");

if (!loggedInUser.email) {
    window.location.replace("../login/loginPage.html");
} else if (loggedInUser.role !== "employee") {
    if (loggedInUser.role === "manager") {
        window.location.replace("../company/CompanyDashboard.html");
    } else if (loggedInUser.role === "company") {
        window.location.replace("../company/AddRemainingProducts.html");
    } else {
        window.location.replace("../login/loginPage.html");
    }
} else {

function nameFromEmail(email){
    const localPart = String(email || "").split("@")[0] || "Employee";
    return localPart
        .split(/[._-]+/)
        .filter(Boolean)
        .map((part)=>part.charAt(0).toUpperCase() + part.slice(1))
        .join(" ");
}

const employeeName =
loggedInUser.name ||
sessionStorage.getItem("employeeName") ||
nameFromEmail(loggedInUser.email) ||
"Employee";

const employeeId =
loggedInUser.empId ||
sessionStorage.getItem("employeeId") ||
employeeName.toLowerCase().replace(/\s+/g, "-");

sessionStorage.setItem("employeeId", employeeId);
sessionStorage.setItem("employeeName", employeeName);

function stsReportsStorageKey(id) {
    return "stsEmployeeReports:" + String(id || "");
}

function stsLoadEmployeeReports(id) {
    const key = stsReportsStorageKey(id);
    let list = [];
    try {
        const raw = localStorage.getItem(key);
        if (raw) list = JSON.parse(raw);
    } catch (_e) {
        list = [];
    }
    if (!Array.isArray(list)) list = [];
    if (list.length) return list;
    try {
        const legacy = JSON.parse(localStorage.getItem("employeeReports") || "[]");
        if (!Array.isArray(legacy) || !legacy.length) return [];
        const mine = legacy.filter(
            (r) => String(r.employeeId || "") === String(id)
        );
        if (mine.length) {
            localStorage.setItem(key, JSON.stringify(mine));
        }
        return mine;
    } catch (_e) {
        return [];
    }
}

function stsSaveEmployeeReports(id, reports) {
    localStorage.setItem(
        stsReportsStorageKey(id),
        JSON.stringify(reports)
    );
}

// SHOW EMPLOYEE NAME

document.getElementById("employeeName").innerHTML =
employeeName;

// FIRST LETTER

const firstLetter =
employeeName.charAt(0).toUpperCase();

// SHOW FIRST LETTER

document.querySelector(".profile-img").innerHTML =
firstLetter;

// TABLE

const tableBody = document.getElementById("tableBody");

const noData = document.getElementById("noData");

let reports = stsLoadEmployeeReports(employeeId);

// FUNCTION TO SHOW REPORTS

function displayReports(){

    tableBody.innerHTML = "";

    if(reports.length > 0){

        noData.style.display = "none";

        reports.forEach((report,index)=>{

            const row = `
                <tr>

                    <td>${report.dateTime}</td>

                    <td>${report.location}</td>

                    <td>${report.product}</td>

                    <td>${report.quantity}</td>

                    <td>₹${report.sales}</td>

                    <td class="status">
                        Submitted
                    </td>

                    <td>
                        <button class="delete-btn"
                        onclick="deleteReport(${index})">
                            Delete
                        </button>
                    </td>

                </tr>
            `;

            tableBody.innerHTML += row;

        });

    }else{

        noData.style.display = "block";

    }

}

// DELETE REPORT

function deleteReport(index){

    const confirmDelete =
    confirm("Are you sure you want to delete this report?");

    if(confirmDelete){

        reports.splice(index,1);

        stsSaveEmployeeReports(employeeId, reports);

        displayReports();

    }

}

// SHOW REPORTS

displayReports();

// BACK BUTTON

function goBack(){

    window.location.href = "EmployeesDashboard.html";

}

}

</script>

</body>
</html>
